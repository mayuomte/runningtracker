<style>
    .want-item {
        background: var(--surface-card);
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 8px;
        border-left: 4px solid var(--accent);
        display: flex;
        flex-direction: column;
        gap: 4px;
    }
    .want-link {
        color: var(--accent);
        text-decoration: none;
        font-size: 13px;
        word-break: break-all;
        font-weight: 500;
    }
    .paste-box {
        width: 100%;
        padding: 12px;
        border: 2px dashed var(--border);
        border-radius: 12px;
        background: var(--surface-elevated);
        font-family: inherit;
        margin-bottom: 12px;
        color: var(--text);
    }
</style>

<div id="tab-shop" class="hidden">
    <div class="section-label">Redeem Rewards</div>
    <div id="reward-list"></div>

    <div class="section-label" style="margin-top: 24px;">Want List</div>
    <div class="card">
        <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">Paste a product link to save for later:</p>
        <input type="text" id="wantUrlInput" class="paste-box" placeholder="https://store.com/product...">
        <button class="primary-btn" style="margin-top: 0;" onclick="app.addWant()">Save to Want List</button>
    </div>
    <div id="want-list"></div>
</div>

<script>
    // Add 'wants' to your app's data object
    const app = {
        data: { 
            runs: [], 
            redeemed: [], 
            wants: [] // New list for your products
        },

        init() {
            const saved = localStorage.getItem('run-rewards-data');
            if (saved) {
                const parsed = JSON.parse(saved);
                this.data = { ...this.data, ...parsed }; // Merge to ensure 'wants' exists
            }
            this.updateUI();
            
            // iPad paste listener
            document.getElementById('wantUrlInput').addEventListener('paste', (e) => {
                // Optional: Auto-trigger save on paste
                setTimeout(() => this.addWant(), 100);
            });
        },

        // ... Keep your existing calculatePoints, manualLog, save, updateUI, and renderShop functions ...

        renderShop() {
            // ... (Your existing reward rendering code) ...
            this.renderWants();
        },

        addWant() {
            const input = document.getElementById('wantUrlInput');
            const url = input.value.trim();
            if (!url) return;

            // Basic extraction: get the domain name as a title (e.g., amazon.com)
            let title = "Product Link";
            try {
                const domain = new URL(url).hostname.replace('www.', '');
                title = `Item from ${domain}`;
            } catch(e) { 
                alert("Please paste a valid URL");
                return;
            }

            const newItem = {
                id: Date.now(),
                url: url,
                title: title,
                date: new Date().toISOString()
            };

            this.data.wants.unshift(newItem);
            input.value = '';
            this.save();
            this.renderWants();
        },

        renderWants() {
            const container = document.getElementById('want-list');
            if (!this.data.wants) this.data.wants = [];
            
            container.innerHTML = this.data.wants.map(item => `
                <div class="want-item">
                    <div class="flex-between">
                        <span style="font-weight: 700; font-size: 14px;">${item.title}</span>
                        <button onclick="app.deleteWant(${item.id})" style="background:none; border:none; color:var(--text-secondary); font-size:16px;">✕</button>
                    </div>
                    <a href="${item.url}" target="_blank" class="want-link">${item.url}</a>
                    <small style="color: var(--text-secondary); font-size: 10px;">Added ${new Date(item.date).toLocaleDateString()}</small>
                </div>
            `).join('');
        },

        deleteWant(id) {
            this.data.wants = this.data.wants.filter(w => w.id !== id);
            this.save();
            this.renderWants();
        }
    };

    app.init();
</script>
